<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <title>DevClub - Gerador de IA</title>
</head>
<body>
    <h1>CSS Gerador <span>com IA</span>⚡️</h1>
    <p>Descreva o que você imagina e veja a mágica acontecer</p>

    <textarea rows="3" class="caixa-texto" placeholder="Ex: Bola azul pingando"></textarea>
    <button class="botao-gerar">Gerar Código ⚡️</button>

    <div class="container-flex">
        <div class="coluna">
            <h2>Código</h2>
            <p class="bloco-codigo"></p>
        </div>

        <div class="coluna">
            <h2>Preview</h2>
            <iframe class="resultado-codigo"></iframe>
        </div>
    </div> 

    <footer>
        <p>
            <span class="data-conclusao">23/03/2026</span> 
            <span class="divisor">|</span> 
            <span class="marca-registrada">&lt;EFcode /&gt;©™</span>
        </p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
